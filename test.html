<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Debug Edu Docs</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    body{font-family:system-ui;padding:20px;background:#0f172a;color:#fff}
    .box{background:#1e293b;padding:20px;border-radius:12px;margin:10px 0;border-left:4px solid #4f46e5}
    .error{border-left-color:#ef4444;background:#2d1b1b}
    .success{border-left-color:#10b981;background:#1b2d1b}
    pre{background:#000;padding:12px;border-radius:8px;overflow:auto;font-size:12px}
  </style>
</head>
<body>
  <h1>🔍 Debug Edu Docs Premium</h1>
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');
    
    function log(title, msg, type = 'box') {
      results.innerHTML += `<div class="${type}"><h3>${title}</h3><pre>${msg}</pre></div>`;
    }

    // Test 1 : Firebase chargé ?
    if (typeof firebase === 'undefined') {
      log('❌ TEST 1 : Firebase', 'Firebase non chargé ! Problème de script', 'error');
    } else {
      log('✅ TEST 1 : Firebase', 'Firebase chargé OK', 'success');
    }

    // Test 2 : Init
    try {
      const firebaseConfig = {
        apiKey: "AIzaSyCuFWrXl7A2PfoXiMSezgmnO-Ia_qR5z9o",
        authDomain: "betsaleel-docs.firebaseapp.com",
        projectId: "betsaleel-docs",
        storageBucket: "betsaleel-docs.firebasestorage.app",
        messagingSenderId: "553632456671",
        appId: "1:553632456671:web:3f38ccee6474b63f996e6a"
      };
      firebase.initializeApp(firebaseConfig);
      log('✅ TEST 2 : Init Firebase', 'Initialisation réussie', 'success');
    } catch (err) {
      log('❌ TEST 2 : Init Firebase', err.message, 'error');
    }

    // Test 3 : Firestore lecture
    const db = firebase.firestore();
    db.collection('documents').limit(1).get()
      .then(snap => {
        log('✅ TEST 3 : Firestore READ', `Lecture OK ! Documents trouvés: ${snap.size}\n\nSi 0 c'est normal si t'as pas encore publié de doc.`, 'success');
      })
      .catch(err => {
        log('❌ TEST 3 : Firestore READ', `CODE: ${err.code}\nMESSAGE: ${err.message}\n\n👉 SI "permission-denied" = RÈGLES FIRESTORE À CHANGER`, 'error');
      });

    // Test 4 : Firestore écriture
    db.collection('documents').add({
      test: true,
      date: new Date().toISOString()
    })
      .then(() => {
        log('✅ TEST 4 : Firestore WRITE', 'Écriture OK ! Tu peux publier des docs.', 'success');
      })
      .catch(err => {
        log('❌ TEST 4 : Firestore WRITE', `CODE: ${err.code}\nMESSAGE: ${err.message}\n\n👉 SI "permission-denied" = RÈGLES BLOQUENT L'ÉCRITURE`, 'error');
      });
  </script>
</body>
</html>
