<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Edu Docs Premium</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="admin-container">
    <div id="loginScreen">
      <div class="card" style="max-width:400px;margin:80px auto">
        <h2>Connexion Admin</h2>
        <form id="adminLogin">
          <label>Mot de passe<input type="password" id="adminPass" required></label>
          <button class="btn full" style="margin-top:16px">Se connecter</button>
        </form>
      </div>
    </div>

    <div id="adminDashboard" style="display:none">
      <div class="admin-header">
        <h1>Dashboard Edu Docs Premium</h1>
        <button class="btn danger" id="logoutBtn">Déconnexion</button>
      </div>

      <div class="card">
        <h3>Publier un document</h3>
        <form id="docForm">
          <div class="grid-2">
            <label>Titre<input type="text" id="docTitle" required></label>
            <label>Niveau
              <select id="docNiveau" required>
                <option>6ème</option><option>5ème</option><option>4ème</option>
                <option>3ème</option><option>Seconde</option><option>Première</option><option>Terminale</option>
              </select>
            </label>
            <label>Matière
              <select id="docMatiere" required>
                <option>Mathématiques</option><option>Physique</option><option>Chimie</option>
                <option>Français</option><option>Anglais</option><option>SVT</option>
                <option>Histoire-Géo</option><option>Philosophie</option>
              </select>
            </label>
            <label>Prix FCFA<input type="number" id="docPrice" required></label>
            <label>ID Google Drive<input type="text" id="docDriveId" placeholder="1JUTfSFXs..." required></label>
            <label>Image URL<input type="url" id="docImage"></label>
          </div>
          <label>Description<textarea id="docDesc" rows="3"></textarea></label>
          <button class="btn full">🚀 Publier le document</button>
        </form>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3>Documents (<span id="docsCount">0</span>)</h3>
          <div id="docsList"></div>
        </div>
        <div class="card">
          <h3>Commandes à valider</h3>
          <div id="ordersList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
